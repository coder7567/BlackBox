<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collins Aerospace - Black Box Dashboard</title>
    <style>
        :root {
            --bg-color: #0b132b;
            --panel-bg: #1c2541;
            --text-color: #e0e1dd;
            --accent-blue: #3a506b;
            --highlight: #5bc0be;
            --danger: #ef233c;
            --warning: #ffb703;
            --success: #2ec4b6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--accent-blue);
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 2px;
            color: var(--highlight);
        }

        .logo span {
            color: var(--text-color);
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 3fr;
            gap: 20px;
        }

        .panel {
            background-color: var(--panel-bg);
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        .panel h2 {
            margin-top: 0;
            border-bottom: 1px solid var(--accent-blue);
            padding-bottom: 10px;
            font-size: 18px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            font-size: 16px;
        }

        .dot {
            height: 12px;
            width: 12px;
            background-color: var(--success);
            border-radius: 50%;
            display: inline-block;
            margin-right: 10px;
            box-shadow: 0 0 5px var(--success);
        }

        .dot.offline { background-color: var(--danger); box-shadow: 0 0 5px var(--danger); }
        .dot.warning { background-color: var(--warning); box-shadow: 0 0 5px var(--warning); }

        .counter-box {
            background-color: var(--bg-color);
            border: 1px solid var(--accent-blue);
            border-radius: 5px;
            padding: 15px;
            text-align: center;
            margin-top: 20px;
        }

        .counter-value {
            font-size: 36px;
            font-weight: bold;
            color: var(--highlight);
        }

        .event-feed {
            height: 400px;
            overflow-y: auto;
            background-color: var(--bg-color);
            padding: 10px;
            border-radius: 5px;
            border: 1px solid var(--accent-blue);
        }

        .event-item {
            padding: 10px;
            border-bottom: 1px solid var(--panel-bg);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: rgba(255, 255, 255, 0.05);
            margin-bottom: 5px;
            border-radius: 4px;
        }
        
        .event-item:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }

        .event-time {
            font-family: monospace;
            color: #8d99ae;
            font-size: 12px;
            width: 80px;
        }

        .event-type {
            font-weight: bold;
            width: 150px;
        }
        
        .type-FILE_QUARANTINE { color: var(--warning); }
        .type-DNS_BLOCK { color: var(--highlight); }
        .type-ELF_DETECTED { color: var(--danger); }
        .type-INTERNET_CUT { color: var(--danger); font-weight: bold; }

        .event-details {
            flex-grow: 1;
            font-family: monospace;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        @keyframes flashRed {
            0% { background-color: var(--panel-bg); }
            50% { background-color: rgba(239, 35, 60, 0.3); }
            100% { background-color: var(--panel-bg); }
        }

        .critical-alert {
            animation: flashRed 1s infinite;
            border: 2px solid var(--danger);
        }
        
        .banner {
            display: none;
            background-color: var(--danger);
            color: white;
            text-align: center;
            padding: 15px;
            font-weight: bold;
            font-size: 20px;
            border-radius: 5px;
            margin-bottom: 20px;
            animation: flashRed 1s infinite;
        }
        
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-color); 
        }
        ::-webkit-scrollbar-thumb {
            background: var(--accent-blue); 
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div id="criticalBanner" class="banner">CRITICAL SECURITY ALERT: ZERO-TRUST PROTOCOL ENGAGED</div>

    <header>
        <div class="logo">COLLINS <span>AEROSPACE</span></div>
        <div>BLACK BOX SECURITY SUITE v2.0</div>
    </header>

    <div class="dashboard-grid">
        <!-- Sidebar Panel -->
        <div class="panel">
            <h2>System Status</h2>
            
            <div class="status-indicator">
                <span id="dot-internet" class="dot"></span>
                <span>Internet Uplink</span>
            </div>
            
            <div class="status-indicator">
                <span id="dot-edr" class="dot"></span>
                <span>ZAK-TRAP (EDR)</span>
            </div>
            
            <div class="status-indicator">
                <span id="dot-dns" class="dot"></span>
                <span>Linn-Mar Shield (DNS)</span>
            </div>
            
            <div class="status-indicator">
                <span id="dot-vm" class="dot"></span>
                <span>VM Snapshot</span>
            </div>

            <div class="counter-box">
                <div>Threat Escalation Factor</div>
                <div id="frustrationCounter" class="counter-value">0</div>
                <div style="font-size: 12px; color: #8d99ae; margin-top: 5px;">Auto-resets after 120s idle</div>
            </div>
        </div>

        <!-- Main Panel -->
        <div class="panel" id="mainPanel">
            <h2>Live Telemetry Feed</h2>
            <div class="event-feed" id="eventFeed">
                <!-- Events will be injected here -->
                <div style="text-align: center; color: #8d99ae; margin-top: 20px; font-style: italic;">Awaiting telemetry...</div>
            </div>
        </div>
    </div>

    <script>
        const feed = document.getElementById('eventFeed');
        let eventCount = 0;

        function addEvent(data) {
            if (eventCount === 0) feed.innerHTML = ''; // clear waiting text
            
            const item = document.createElement('div');
            item.className = 'event-item';
            
            const time = new Date().toLocaleTimeString('en-US', { hour12: false });
            
            item.innerHTML = `
                <div class="event-time">${time}</div>
                <div class="event-type type-${data.type}">${data.type.replace('_', ' ')}</div>
                <div class="event-details" title="${data.details}">${data.details}</div>
            `;
            
            feed.prepend(item);
            eventCount++;
            
            // Keep only last 20
            if (feed.children.length > 20) {
                feed.removeChild(feed.lastChild);
            }
        }

        const source = new EventSource("/stream");
        
        source.onmessage = function(event) {
            const data = JSON.parse(event.data);
            
            // Update UI components
            addEvent(data);
            
            document.getElementById('frustrationCounter').innerText = data.counter;
            
            const internetDot = document.getElementById('dot-internet');
            if (data.internet) {
                internetDot.className = 'dot'; // green
            } else {
                internetDot.className = 'dot offline';
            }
            
            // Handle critical alerts
            if (data.type === 'ELF_DETECTED' || data.counter >= 3) {
                document.getElementById('criticalBanner').style.display = 'block';
                document.getElementById('mainPanel').classList.add('critical-alert');
                
                // Try to play browser beep
                try {
                    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    const oscillator = audioCtx.createOscillator();
                    oscillator.type = 'square';
                    oscillator.frequency.setValueAtTime(800, audioCtx.currentTime); // 800Hz
                    oscillator.connect(audioCtx.destination);
                    oscillator.start();
                    setTimeout(() => oscillator.stop(), 500);
                } catch(e) {}
                
            } else if (data.counter === 0) {
                document.getElementById('criticalBanner').style.display = 'none';
                document.getElementById('mainPanel').classList.remove('critical-alert');
            }
        };
    </script>
</body>
</html>
